n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

// ===== USER ID =====
function gerarId(){
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'
  let id = ''
  for(let i = 0; i < 8; i++){
    id += chars.charAt(Math.floor(Math.random() * chars.length))
  }
  return id
}

function getUserId(){
  let id = localStorage.getItem('user_id')
  if(!id || id.length !== 8){
    id = gerarId()
    localStorage.setItem('user_id', id)
  }
  return id
}

const userId = getUserId()

fbq('init', '799819532599997', { external_id: userId })
fbq('track', 'PageView', { external_id: userId })

function enviarEvento(valor){
  if(!valor) return
  const nome = valor.replace(/[^a-zA-Z0-9]/g, "")
  if(!nome) return
  try { fbq('trackCustom', nome, { external_id: userId }) } catch {}
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<script>
(async function(){

// =========================================================
// DEBUG MODE
// =========================================================
const DEBUG = false

// =========================================================
// GOOGLE SHEETS — URL do Apps Script N33
// =========================================================
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyRp-cEQuFJpENz2zise9vxSZ8-xcF7mn4PmZvJ4_cohJYJODSZvTOLqQv9f2WOWOf6/exec"

// =========================================================
// TIMEOUT HELPER
// =========================================================
function timeout(promise, ms, fallback){
  return Promise.race([
    promise,
    new Promise(res => setTimeout(() => res(fallback), ms))
  ])
}

// =========================================================
// DETECTAR WEBVIEW E DISPOSITIVO
// =========================================================
function isWebView(){
  const ua = navigator.userAgent || ""
  return /Instagram|FBAN|FBAV|FB_IAB|Facebook|BytedanceWebview/i.test(ua)
}

function isAndroid(){
  return /android/i.test(navigator.userAgent)
}

function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent)
}

// =========================================================
// PARAMS
// =========================================================
const params = new URLSearchParams(window.location.search)
let LINK = null, UC = null

const raw = params.get("dest")
if(raw && raw.includes("|||")){
  const p = raw.split("|||")
  LINK = p[0]
  UC   = p[1]
} else {
  LINK = params.get("dest")
  UC   = params.get("uc")
}

if(!LINK || !UC){
  throw new Error("Parametros invalidos")
}

// =========================================================
// PLACEMENT
// =========================================================
const plRaw  = (params.get("pl")  || "").toLowerCase().trim()
const srcRaw = (params.get("src") || "").toLowerCase().trim()

function classPlacement(p){
  if(!p || p.includes("{{")) return "PU"
  const n = p.replace(/[_\s-]/g, "")
  if(n.includes("profilereels"))  return "PP"
  if(n.includes("reelsoverlay"))  return "PV"
  if(n.includes("reels"))         return "PR"
  if(n.includes("stories"))       return "PS"
  if(n.includes("explorehome"))   return "PH"
  if(n.includes("explore"))       return "PE"
  if(n.includes("search"))        return "PQ"
  if(n.includes("marketplace"))   return "PM"
  if(n.includes("instream"))      return "PI"
  if(n.includes("video"))         return "PI"
  if(n.includes("messenger"))     return "PG"
  if(n.includes("audience"))      return "PA"
  if(n.includes("feed"))          return "PF"
  return "PO"
}

function classSrc(s){
  if(!s || s.includes("{{")) return "SU"
  if(s === "ig")  return "SI"
  if(s === "fb")  return "SF"
  if(s === "msg") return "SM"
  if(s === "an")  return "SA"
  return "SU"
}

const placementTag = classPlacement(plRaw)
const sourceTag    = classSrc(srcRaw)

// =========================================================
// BASE UC
// =========================================================
const baseUC = UC.replace(/[^a-zA-Z0-9]/g, "").slice(0, 16)

// =========================================================
// TEMPO
// =========================================================
const tempoTag = "T1"

// =========================================================
// VELOCIDADE
// =========================================================
function classificarVel(mbps){
  if(mbps <= 0.5) return 1
  if(mbps <= 1)   return 3
  if(mbps <= 5)   return 6
  if(mbps <= 10)  return 8
  if(mbps <= 20)  return 10
  return 14
}

async function medirVelocidade(){
  try {
    const downlink = navigator.connection?.downlink || 5
    return "N" + classificarVel(downlink)
  } catch { return "N6" }
}

// =========================================================
// BATERIA
// =========================================================
async function medirBateria(){
  try {
    const bat = await navigator.getBattery()
    const pct = Math.round(bat.level * 10)
    const nivel = pct < 2 ? "BL" : "B" + pct
    const carregando = bat.charging ? "C1" : "C0"
    return { bateria: nivel, carregando }
  } catch { return { bateria: "", carregando: "" } }
}

// =========================================================
// MOVIMENTO
// =========================================================
function medirMovimento(){
  return new Promise(resolve => {
    let detectado = false
    function handler(e){
      const acc = e.accelerationIncludingGravity
      if(!acc) return
      const total = Math.abs(acc.x||0) + Math.abs(acc.y||0) + Math.abs(acc.z||0)
      if(total > 15) detectado = true
    }
    if(typeof DeviceMotionEvent !== "undefined"){
      window.addEventListener("devicemotion", handler)
      setTimeout(() => {
        window.removeEventListener("devicemotion", handler)
        resolve(detectado ? "M1" : "M0")
      }, 120)
    } else {
      resolve("M0")
    }
  })
}

// =========================================================
// RAM
// =========================================================
function medirRAM(){
  const ram = navigator.deviceMemory || 4
  if(ram <= 2) return "R1"
  if(ram <= 4) return "R2"
  if(ram <= 8) return "R3"
  return "R4"
}

// =========================================================
// WEBRTC
// =========================================================
function medirWebRTC(){
  return new Promise(resolve => {
    try {
      const pc  = new RTCPeerConnection({ iceServers: [] })
      const ips = new Set()
      let encerrado = false

      function encerrar(){
        if(encerrado) return
        encerrado = true
        try { pc.close() } catch {}
        let tag = "RU"
        for(const ip of [...ips]){
          if(/^10\./.test(ip))                               { tag = "RC"; break }
          if(/^172\.(1[6-9]|2\d|3[01])\./.test(ip))         { tag = "RV"; break }
          if(/^192\.168\./.test(ip))                           tag = "RH"
        }
        resolve(tag)
      }

      pc.onicecandidate = e => {
        if(!e || !e.candidate){ encerrar(); return }
        const m = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/)
        if(m) ips.add(m[1])
      }

      pc.createDataChannel('')
      pc.createOffer()
        .then(o => pc.setLocalDescription(o))
        .catch(() => resolve("RU"))

      setTimeout(() => encerrar(), 850)

    } catch { resolve("RU") }
  })
}

// =========================================================
// FBC e FBP
// =========================================================
function getCookie(name){
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'))
  return match ? match[2] : ""
}

// =========================================================
// OUTROS SINCRONOS
// =========================================================
const tema    = window.matchMedia('(prefers-color-scheme: dark)').matches ? "D" : "L"
const ua      = navigator.userAgent || ""
const device  = /android/i.test(ua) ? "A" : /iphone|ipad|ipod/i.test(ua) ? "I" : "O"
const vib     = navigator.vibrate ? "V1" : "V0"
const conexao = (() => {
  const c = navigator.connection
  if(!c)                    return "U"
  if(c.type === "wifi")     return "W"
  if(c.type === "cellular") return "M"
  return "U"
})()

// =========================================================
// EXECUCAO PARALELA
// =========================================================
const [velTag, batObj, movimento, redeTag] = await Promise.all([
  timeout(medirVelocidade(), 200, "N6"),
  timeout(medirBateria(),    200, { bateria: "", carregando: "" }),
  timeout(medirMovimento(),  200, "M0"),
  timeout(medirWebRTC(),     950, "RU")
])

const ram = medirRAM()

// =========================================================
// DEBUG
// =========================================================
if(DEBUG){
  alert(
    "=== DEBUG UC ===\n" +
    "pl bruto:     [" + plRaw         + "]\n" +
    "src bruto:    [" + srcRaw        + "]\n" +
    "placementTag: [" + placementTag  + "]\n" +
    "sourceTag:    [" + sourceTag     + "]\n" +
    "redeTag:      [" + redeTag       + "]\n" +
    "velTag:       [" + velTag        + "]\n" +
    "bateria:      [" + batObj.bateria + batObj.carregando + "]\n" +
    "device:       [" + device        + "]\n" +
    "conexao:      [" + conexao       + "]\n" +
    "movimento:    [" + movimento     + "]\n" +
    "userId:       [" + userId        + "]\n" +
    "isWebView:    [" + isWebView()   + "]"
  )
}

// =========================================================
// EVENTOS META
// =========================================================
;[
  tempoTag,
  velTag,
  batObj.bateria,
  batObj.carregando,
  tema,
  ram,
  vib,
  device,
  conexao,
  movimento,
  redeTag,
  placementTag,
  sourceTag
].forEach(enviarEvento)

// =========================================================
// MONTAGEM DO UC FINAL
// =========================================================
const idTag = "ID" + userId

const corpo = (
  baseUC            +
  tempoTag          +
  velTag            +
  batObj.bateria    +
  batObj.carregando +
  tema              +
  ram               +
  vib               +
  device            +
  conexao           +
  movimento         +
  redeTag           +
  placementTag      +
  sourceTag
).replace(/[^a-zA-Z0-9]/g, "")

const MAX         = 48
const espacoCorpo = MAX - idTag.length
const corpoFinal  = corpo.slice(0, espacoCorpo)
const finalUC     = corpoFinal + idTag

// =========================================================
// SALVAR NO GOOGLE SHEETS
// =========================================================
try {
  const fbc = getCookie("_fbc") || params.get("fbclid") || ""
  const fbp = getCookie("_fbp") || ""

  const agora = new Date()
  const data_hora = agora.toLocaleString("pt-BR", { timeZone: "America/Sao_Paulo" })

  const payload = {
    data_hora,
    external_id : userId,
    fbc,
    fbp,
    placement   : placementTag,
    source      : sourceTag,
    device,
    conexao,
    rede        : redeTag,
    velocidade  : velTag,
    uc_completo : finalUC
  }

  fetch(SHEETS_URL, {
    method  : "POST",
    mode    : "no-cors",
    headers : { "Content-Type": "application/json" },
    body    : JSON.stringify(payload)
  }).catch(() => {})

} catch(e) {}

// =========================================================
// URL FINAL DA SHOPEE
// =========================================================
const shopeeUrl = `https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`

// =========================================================
// REDIRECT — força navegador externo se estiver no WebView
// =========================================================
if(isWebView()){

  if(isAndroid()){
    const intentUrl =
      "intent://" +
      shopeeUrl.replace(/^https?:\/\//, "") +
      "#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=" +
      encodeURIComponent(shopeeUrl) +
      ";end"
    window.location.href = intentUrl

  } else if(isIOS()){
    window.open(shopeeUrl, "_blank")
    setTimeout(() => { window.location.href = shopeeUrl }, 500)

  } else {
    window.location.href = shopeeUrl
  }

} else {
  window.location.href = shopeeUrl
}

})();
</script>
</body>
</html>
