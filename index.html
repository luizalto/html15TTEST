<!DOCTYPE html>
<html lang="pt-br">
<head>

<script>
!function(f,b,e,v,n,t,s){
if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

// ===== USER ID =====
function gerarId(){
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'
  let id = ''
  for(let i = 0; i < 8; i++){
    id += chars.charAt(Math.floor(Math.random() * chars.length))
  }
  return id
}

function getUserId(){
  let id = localStorage.getItem('user_id')
  if(!id || id.length !== 8){
    id = gerarId()
    localStorage.setItem('user_id', id)
  }
  return id
}

const userId = getUserId()

fbq('init', '799819532599997', { external_id: userId })
fbq('track', 'PageView', { external_id: userId })

function enviarEvento(valor){
  if(!valor) return
  const nome = valor.replace(/[^a-zA-Z0-9]/g, "")
  if(!nome) return
  try { fbq('trackCustom', nome, { external_id: userId }) } catch {}
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<script>
(async function(){

const DEBUG = false

function timeout(promise, ms, fallback){
  return Promise.race([
    promise,
    new Promise(res => setTimeout(() => res(fallback), ms))
  ])
}

// =========================================================
// PARAMS
// =========================================================
const params = new URLSearchParams(window.location.search)
let LINK = null, UC = null
const raw = params.get("dest")
if(raw && raw.includes("|||")){
  const p = raw.split("|||"); LINK = p[0]; UC = p[1]
} else {
  LINK = params.get("dest"); UC = params.get("uc")
}
if(!LINK || !UC) throw new Error("Parametros invalidos")

const plRaw  = (params.get("pl")  || "").toLowerCase().trim()
const srcRaw = (params.get("src") || "").toLowerCase().trim()

function classPlacement(p){
  if(!p || p.includes("{{")) return "PU"
  const n = p.replace(/[_\s-]/g, "")
  if(n.includes("profilereels"))  return "PP"
  if(n.includes("reelsoverlay"))  return "PV"
  if(n.includes("reels"))         return "PR"
  if(n.includes("stories"))       return "PS"
  if(n.includes("explorehome"))   return "PH"
  if(n.includes("explore"))       return "PE"
  if(n.includes("search"))        return "PQ"
  if(n.includes("marketplace"))   return "PM"
  if(n.includes("instream"))      return "PI"
  if(n.includes("video"))         return "PI"
  if(n.includes("messenger"))     return "PG"
  if(n.includes("audience"))      return "PA"
  if(n.includes("feed"))          return "PF"
  return "PO"
}
function classSrc(s){
  if(!s || s.includes("{{")) return "SU"
  if(s === "ig")  return "SI"
  if(s === "fb")  return "SF"
  if(s === "msg") return "SM"
  if(s === "an")  return "SA"
  return "SU"
}

const placementTag = classPlacement(plRaw)
const sourceTag    = classSrc(srcRaw)
const baseUC       = UC.replace(/[^a-zA-Z0-9]/g, "").slice(0, 16)
const tempoTag     = "T1"

// =========================================================
// MEDICOES — sem bateria aqui
// =========================================================
function classificarVel(mbps){
  if(mbps <= 0.5) return 1
  if(mbps <= 1)   return 3
  if(mbps <= 5)   return 6
  if(mbps <= 10)  return 8
  if(mbps <= 20)  return 10
  return 14
}
async function medirVelocidade(){
  try {
    const downlink = navigator.connection?.downlink || 5
    return "N" + classificarVel(downlink)
  } catch { return "N6" }
}

function medirMovimento(){
  return new Promise(resolve => {
    let detectado = false
    function handler(e){
      const acc = e.accelerationIncludingGravity
      if(!acc) return
      const total = Math.abs(acc.x||0) + Math.abs(acc.y||0) + Math.abs(acc.z||0)
      if(total > 15) detectado = true
    }
    if(typeof DeviceMotionEvent !== "undefined"){
      window.addEventListener("devicemotion", handler)
      setTimeout(() => {
        window.removeEventListener("devicemotion", handler)
        resolve(detectado ? "M1" : "M0")
      }, 120)
    } else { resolve("M0") }
  })
}

function medirRAM(){
  const ram = navigator.deviceMemory || 4
  if(ram <= 2) return "R1"
  if(ram <= 4) return "R2"
  if(ram <= 8) return "R3"
  return "R4"
}

function medirWebRTC(){
  return new Promise(resolve => {
    try {
      const pc  = new RTCPeerConnection({ iceServers: [] })
      const ips = new Set()
      let encerrado = false
      function encerrar(){
        if(encerrado) return
        encerrado = true
        try { pc.close() } catch {}
        let tag = "RU"
        for(const ip of [...ips]){
          if(/^10\./.test(ip))                       { tag = "RC"; break }
          if(/^172\.(1[6-9]|2\d|3[01])\./.test(ip)) { tag = "RV"; break }
          if(/^192\.168\./.test(ip))                   tag = "RH"
        }
        resolve(tag)
      }
      pc.onicecandidate = e => {
        if(!e || !e.candidate){ encerrar(); return }
        const m = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/)
        if(m) ips.add(m[1])
      }
      pc.createDataChannel('')
      pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => resolve("RU"))
      setTimeout(() => encerrar(), 950)
    } catch { resolve("RU") }
  })
}

function getCookie(name){
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'))
  return match ? match[2] : ""
}

// =========================================================
// SINCRONOS
// =========================================================
const tema    = window.matchMedia('(prefers-color-scheme: dark)').matches ? "D" : "L"
const ua      = navigator.userAgent || ""
const device  = /android/i.test(ua) ? "A" : /iphone|ipad|ipod/i.test(ua) ? "I" : "O"
const vib     = navigator.vibrate ? "V1" : "V0"
const conexao = (() => {
  const c = navigator.connection
  if(!c)                    return "U"
  if(c.type === "wifi")     return "W"
  if(c.type === "cellular") return "M"
  return "U"
})()

// =========================================================
// EXECUCAO — sem bateria
// =========================================================
const [velTag, movimento, redeTag] = await Promise.all([
  timeout(medirVelocidade(), 200, "N6"),
  timeout(medirMovimento(),  200, "M0"),
  timeout(medirWebRTC(),     950, "RU")
])

const ram = medirRAM()

// =========================================================
// EVENTOS META
// =========================================================
;[
  tempoTag, velTag,
  tema, ram, vib, device, conexao,
  movimento, redeTag, placementTag, sourceTag
].forEach(enviarEvento)

// =========================================================
// FBC e FBP
// =========================================================
const fbc = getCookie("_fbc") || params.get("fbclid") || ""
const fbp = getCookie("_fbp") || ""

if(DEBUG){
  alert(
    "vel:       [" + velTag      + "]\n" +
    "rede:      [" + redeTag     + "]\n" +
    "device:    [" + device      + "]\n" +
    "conexao:   [" + conexao     + "]\n" +
    "movimento: [" + movimento   + "]\n" +
    "placement: [" + placementTag+ "]\n" +
    "source:    [" + sourceTag   + "]\n" +
    "userId:    [" + userId      + "]\n" +
    "fbc:       [" + fbc         + "]"
  )
}

// =========================================================
// MONTA PARAMETROS PARA SEGUNDA PAGINA
// Passa tudo via URL para o navegador externo montar o UC
// =========================================================
const segundaPagina = "https://luizalto.github.io/html15TTEST/ex/"

const passParams = new URLSearchParams({
  uid  : userId,
  base : baseUC,
  vel  : velTag,
  tema,
  ram,
  vib,
  dev  : device,
  con  : conexao,
  mov  : movimento,
  rede : redeTag,
  pl   : placementTag,
  src  : sourceTag,
  fbc,
  fbp,
  dest : LINK
})

const segundaUrl = segundaPagina + "?" + passParams.toString()

// =========================================================
// REDIRECT PARA NAVEGADOR EXTERNO
// =========================================================
const isAndroid = /android/i.test(ua)
const isIOS     = /iphone|ipad|ipod/i.test(ua)
const isWebView = /Instagram|FBAN|FBAV|FB_IAB|Facebook/i.test(ua)

if(isWebView && isAndroid){
  window.location.href =
    "intent://" +
    segundaUrl.replace(/^https?:\/\//, "") +
    "#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=" +
    encodeURIComponent(segundaUrl) + ";end"

} else if(isWebView && isIOS){
  window.open(segundaUrl, "_blank")
  setTimeout(() => { window.location.href = segundaUrl }, 500)

} else {
  // já está no navegador externo
  window.location.href = segundaUrl
}

})();
</script>
</body>
</html>
