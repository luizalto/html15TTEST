<html lang="pt-br">

<script>

if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

// ===== USER ID =====
function gerarId(){
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'
  let id = ''
  for(let i = 0; i < 8; i++){
    id += chars.charAt(Math.floor(Math.random() * chars.length))
  }
  return id
}

function getUserId(){
  let id = localStorage.getItem('user_id')
  if(!id || id.length !== 8){
    id = gerarId()
    localStorage.setItem('user_id', id)
  }
  return id
}

const userId = getUserId()

fbq('init', '799819532599997', { external_id: userId })
fbq('track', 'PageView', { external_id: userId })

function enviarEvento(valor){
  if(!valor) return
  const nome = valor.replace(/[^a-zA-Z0-9]/g, "")
  if(!nome) return
  try { fbq('trackCustom', nome, { external_id: userId }) } catch {}
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<script>
(async function(){

const DEBUG = false
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyRp-cEQuFJpENz2zise9vxSZ8-xcF7mn4PmZvJ4_cohJYJODSZvTOLqQv9f2WOWOf6/exec"
const PAGINA_URL = "https://luizalto.github.io/html15TTEST/"

function timeout(promise, ms, fallback){
  return Promise.race([
    promise,
    new Promise(res => setTimeout(() => res(fallback), ms))
  ])
}

function isWebView(){
  return /Instagram|FBAN|FBAV|FB_IAB|Facebook|BytedanceWebview/i.test(navigator.userAgent || "")
}
function isAndroid(){ return /android/i.test(navigator.userAgent) }
function isIOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent) }

// =========================================================
// PARAMS
// =========================================================
const params     = new URLSearchParams(window.location.search)
const modoExterno = params.get("modo") === "ext"

// =========================================================
// MODO EXTERNO — chegou pelo navegador externo
// =========================================================
if(modoExterno){

  const extUserId    = params.get("uid")  || ""
  const extBase      = params.get("base") || ""
  const extVel       = params.get("vel")  || "N6"
  const extTema      = params.get("tema") || "D"
  const extRam       = params.get("ram")  || "R2"
  const extVib       = params.get("vib")  || "V0"
  const extDevice    = params.get("dev")  || "O"
  const extConexao   = params.get("con")  || "U"
  const extMovimento = params.get("mov")  || "M0"
  const extRede      = params.get("rede") || "RU"
  const extPlacement = params.get("pl")   || "PU"
  const extSource    = params.get("src")  || "SU"
  const extFbc       = params.get("fbc")  || ""
  const extFbp       = params.get("fbp")  || ""
  const extLink      = params.get("dest") || ""

  if(!extLink || !extUserId) throw new Error("Parametros invalidos")

  // captura bateria no navegador externo — funciona sempre aqui
  async function medirBateriaExt(){
    try {
      const bat = await navigator.getBattery()
      const pct  = Math.round(bat.level * 10)
      const nivel = pct < 2 ? "BL" : "B" + pct
      const carregando = bat.charging ? "C1" : "C0"
      return { bateria: nivel, carregando }
    } catch { return { bateria: "", carregando: "" } }
  }

  const batObj = await timeout(medirBateriaExt(), 2000, { bateria: "", carregando: "" })

  if(DEBUG){
    alert(
      "=== MODO EXTERNO ===\n" +
      "bateria: [" + batObj.bateria + batObj.carregando + "]\n" +
      "userId:  [" + extUserId + "]"
    )
  }

  // monta UC com EX antes do ID
  const idTag   = "ID" + extUserId
  const corpo   = (
    extBase      +
    "T1"         +
    extVel       +
    batObj.bateria +
    batObj.carregando +
    extTema      +
    extRam       +
    extVib       +
    extDevice    +
    extConexao   +
    extMovimento +
    extRede      +
    extPlacement +
    extSource    +
    "EX"
  ).replace(/[^a-zA-Z0-9]/g, "")

  const MAX         = 48
  const espacoCorpo = MAX - idTag.length
  const finalUC     = corpo.slice(0, espacoCorpo) + idTag

  // salva no Sheets
  try {
    const data_hora = new Date().toLocaleString("pt-BR", { timeZone: "America/Sao_Paulo" })
    fetch(SHEETS_URL, {
      method  : "POST",
      mode    : "no-cors",
      headers : { "Content-Type": "application/json" },
      body    : JSON.stringify({
        data_hora,
        external_id : extUserId,
        fbc         : extFbc,
        fbp         : extFbp,
        placement   : extPlacement,
        source      : extSource,
        device      : extDevice,
        conexao     : extConexao,
        rede        : extRede,
        velocidade  : extVel,
        uc_completo : finalUC
      })
    }).catch(() => {})
  } catch(e) {}

  // redireciona para Shopee
  window.location.href = `https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(extLink)}&uc=${finalUC}`
  return
}

// =========================================================
// MODO INTERNO — rodando no WebView do Instagram
// =========================================================
let LINK = null, UC = null
const raw = params.get("dest")
if(raw && raw.includes("|||")){
  const p = raw.split("|||"); LINK = p[0]; UC = p[1]
} else {
  LINK = params.get("dest"); UC = params.get("uc")
}
if(!LINK || !UC) throw new Error("Parametros invalidos")

const plRaw  = (params.get("pl")  || "").toLowerCase().trim()
const srcRaw = (params.get("src") || "").toLowerCase().trim()

function classPlacement(p){
  if(!p || p.includes("{{")) return "PU"
  const n = p.replace(/[_\s-]/g, "")
  if(n.includes("profilereels"))  return "PP"
  if(n.includes("reelsoverlay"))  return "PV"
  if(n.includes("reels"))         return "PR"
  if(n.includes("stories"))       return "PS"
  if(n.includes("explorehome"))   return "PH"
  if(n.includes("explore"))       return "PE"
  if(n.includes("search"))        return "PQ"
  if(n.includes("marketplace"))   return "PM"
  if(n.includes("instream"))      return "PI"
  if(n.includes("video"))         return "PI"
  if(n.includes("messenger"))     return "PG"
  if(n.includes("audience"))      return "PA"
  if(n.includes("feed"))          return "PF"
  return "PO"
}
function classSrc(s){
  if(!s || s.includes("{{")) return "SU"
  if(s === "ig")  return "SI"
  if(s === "fb")  return "SF"
  if(s === "msg") return "SM"
  if(s === "an")  return "SA"
  return "SU"
}

const placementTag = classPlacement(plRaw)
const sourceTag    = classSrc(srcRaw)
const baseUC       = UC.replace(/[^a-zA-Z0-9]/g, "").slice(0, 16)
const tempoTag     = "T1"

// medicoes sem bateria
function classificarVel(mbps){
  if(mbps <= 0.5) return 1; if(mbps <= 1) return 3
  if(mbps <= 5)   return 6; if(mbps <= 10) return 8
  if(mbps <= 20)  return 10; return 14
}
async function medirVelocidade(){
  try { return "N" + classificarVel(navigator.connection?.downlink || 5) }
  catch { return "N6" }
}
function medirMovimento(){
  return new Promise(resolve => {
    let detectado = false
    function handler(e){
      const acc = e.accelerationIncludingGravity; if(!acc) return
      if(Math.abs(acc.x||0)+Math.abs(acc.y||0)+Math.abs(acc.z||0) > 15) detectado = true
    }
    if(typeof DeviceMotionEvent !== "undefined"){
      window.addEventListener("devicemotion", handler)
      setTimeout(() => { window.removeEventListener("devicemotion", handler); resolve(detectado?"M1":"M0") }, 120)
    } else resolve("M0")
  })
}
function medirRAM(){
  const r = navigator.deviceMemory||4
  return r<=2?"R1":r<=4?"R2":r<=8?"R3":"R4"
}
function medirWebRTC(){
  return new Promise(resolve => {
    try {
      const pc = new RTCPeerConnection({iceServers:[]})
      const ips = new Set(); let enc = false
      function encerrar(){
        if(enc) return; enc=true; try{pc.close()}catch{}
        let tag="RU"
        for(const ip of [...ips]){
          if(/^10\./.test(ip)){tag="RC";break}
          if(/^172\.(1[6-9]|2\d|3[01])\./.test(ip)){tag="RV";break}
          if(/^192\.168\./.test(ip)) tag="RH"
        }
        resolve(tag)
      }
      pc.onicecandidate = e => {
        if(!e||!e.candidate){encerrar();return}
        const m=e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/)
        if(m) ips.add(m[1])
      }
      pc.createDataChannel(''); pc.createOffer().then(o=>pc.setLocalDescription(o)).catch(()=>resolve("RU"))
      setTimeout(()=>encerrar(), 950)
    } catch { resolve("RU") }
  })
}
function getCookie(name){
  const m = document.cookie.match(new RegExp('(^| )'+name+'=([^;]+)'))
  return m ? m[2] : ""
}

const tema    = window.matchMedia('(prefers-color-scheme: dark)').matches ? "D" : "L"
const ua      = navigator.userAgent || ""
const device  = /android/i.test(ua) ? "A" : /iphone|ipad|ipod/i.test(ua) ? "I" : "O"
const vib     = navigator.vibrate ? "V1" : "V0"
const conexao = (() => {
  const c = navigator.connection
  if(!c) return "U"; if(c.type==="wifi") return "W"; if(c.type==="cellular") return "M"; return "U"
})()

const [velTag, movimento, redeTag] = await Promise.all([
  timeout(medirVelocidade(), 200, "N6"),
  timeout(medirMovimento(),  200, "M0"),
  timeout(medirWebRTC(),     950, "RU")
])
const ram = medirRAM()

;[tempoTag, velTag, tema, ram, vib, device, conexao, movimento, redeTag, placementTag, sourceTag].forEach(enviarEvento)

const fbc = getCookie("_fbc") || params.get("fbclid") || ""
const fbp = getCookie("_fbp") || ""

// =========================================================
// MONTA URL PARA SEGUNDA CHAMADA (navegador externo)
// =========================================================
const extParams = new URLSearchParams({
  modo : "ext",
  uid  : userId,
  base : baseUC,
  vel  : velTag,
  tema, ram, vib,
  dev  : device,
  con  : conexao,
  mov  : movimento,
  rede : redeTag,
  pl   : placementTag,
  src  : sourceTag,
  fbc, fbp,
  dest : LINK
})

const extUrl = PAGINA_URL + "?" + extParams.toString()

// =========================================================
// FALLBACK INTERNO — dispara após 3 segundos
// se a pessoa não foi para o navegador externo
// =========================================================
async function medirBateriaInterna(){
  try {
    const bat = await navigator.getBattery()
    const pct  = Math.round(bat.level * 10)
    return {
      bateria    : pct < 2 ? "BL" : "B" + pct,
      carregando : bat.charging ? "C1" : "C0"
    }
  } catch { return { bateria: "", carregando: "" } }
}

let fallbackDisparado = false

const fallbackTimer = setTimeout(async () => {
  fallbackDisparado = true

  // tenta capturar bateria internamente
  const batObj = await timeout(medirBateriaInterna(), 1000, { bateria: "", carregando: "" })

  // monta UC com IX (interno) antes do ID
  const idTag   = "ID" + userId
  const corpo   = (
    baseUC            +
    tempoTag          +
    velTag            +
    batObj.bateria    +
    batObj.carregando +
    tema + ram + vib + device + conexao +
    movimento + redeTag + placementTag + sourceTag +
    "IX"
  ).replace(/[^a-zA-Z0-9]/g, "")

  const MAX         = 48
  const espacoCorpo = MAX - idTag.length
  const finalUC     = corpo.slice(0, espacoCorpo) + idTag

  if(DEBUG) alert("=== FALLBACK INTERNO ===\nUC: " + finalUC)

  // salva no Sheets
  try {
    const data_hora = new Date().toLocaleString("pt-BR", { timeZone: "America/Sao_Paulo" })
    fetch(SHEETS_URL, {
      method  : "POST",
      mode    : "no-cors",
      headers : { "Content-Type": "application/json" },
      body    : JSON.stringify({
        data_hora,
        external_id : userId,
        fbc, fbp,
        placement   : placementTag,
        source      : sourceTag,
        device, conexao,
        rede        : redeTag,
        velocidade  : velTag,
        uc_completo : finalUC
      })
    }).catch(() => {})
  } catch(e) {}

  // redireciona para Shopee
  window.location.href = `https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`

}, 3000)

// =========================================================
// TENTA ABRIR NAVEGADOR EXTERNO
// =========================================================
if(DEBUG) alert("Tentando abrir navegador externo...")

if(isWebView()){
  if(isAndroid()){
    window.location.href =
      "intent://" +
      extUrl.replace(/^https?:\/\//, "") +
      "#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=" +
      encodeURIComponent(extUrl) + ";end"
  } else if(isIOS()){
    window.open(extUrl, "_blank")
    // no iOS o fallback continua rodando normalmente
  } else {
    clearTimeout(fallbackTimer)
    window.location.href = extUrl
  }
} else {
  // já está no navegador externo — cancela fallback e vai para extUrl
  clearTimeout(fallbackTimer)
  window.location.href = extUrl
}

})();
</script>
</body>
</html>
