<!DOCTYPE html>
<html lang="pt-br">
<head>

<script>
!function(f,b,e,v,n,t,s){
if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

function gerarId(){
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'
  let id = ''
  for(let i = 0; i < 8; i++){
    id += chars.charAt(Math.floor(Math.random() * chars.length))
  }
  return id
}

function getUserId(){
  let id = localStorage.getItem('user_id')
  if(!id || id.length !== 8){
    id = gerarId()
    localStorage.setItem('user_id', id)
  }
  return id
}

const userId = getUserId()

fbq('init', '799819532599997', { external_id: userId })
fbq('track', 'PageView', { external_id: userId })

function enviarEvento(valor){
  if(!valor) return
  const nome = valor.replace(/[^a-zA-Z0-9]/g, "")
  if(!nome) return
  try { fbq('trackCustom', nome, { external_id: userId }) } catch {}
}

function isWebView(){
  return /Instagram|FBAN|FBAV|FB_IAB|Facebook|BytedanceWebview/i.test(navigator.userAgent || "")
}

function getCookie(name){
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'))
  return match ? match[2] : ""
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<script>
(async function(){

const params = new URLSearchParams(window.location.search)

// =========================================================
// 🔥 FASE 2 → VOLTOU DO NAVEGADOR EXTERNO
// =========================================================
if(params.get("data")){

  const dados = JSON.parse(atob(params.get("data")))
  const veioDoInstagram = params.get("from_insta") === "1"

  const saiu = veioDoInstagram && !isWebView()
  const navTag = saiu ? "X1" : "X0"

  const idTag = "ID" + dados.userId

  const corpo = (dados.corpo + navTag).replace(/[^a-zA-Z0-9]/g, "")

  const MAX = 48
  const finalUC = corpo.slice(0, MAX - idTag.length) + idTag

  const fbc = getCookie("_fbc") || params.get("fbclid") || ""
  const fbp = getCookie("_fbp") || ""

  // EVENTO NOVO
  fbq('trackCustom', 'SaiuDoInstagram', {
    external_id: dados.userId,
    fbc,
    fbp,
    saiu: saiu ? 1 : 0,
    nav: navTag
  })

  // REDIRECT FINAL
  const finalUrl = `https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(dados.LINK)}&uc=${finalUC}`

  window.location.href = finalUrl
  return
}

// =========================================================
// 🔵 FASE 1 ORIGINAL (INTOCADA)
// =========================================================

const raw = params.get("dest")
let LINK = null, UC = null

if(raw && raw.includes("|||")){
  const p = raw.split("|||")
  LINK = p[0]
  UC   = p[1]
} else {
  LINK = params.get("dest")
  UC   = params.get("uc")
}

if(!LINK || !UC) throw new Error("Parametros invalidos")

const baseUC = UC.replace(/[^a-zA-Z0-9]/g, "").slice(0, 16)
const tempoTag = "T1"

// ===== COLETAS ORIGINAIS =====
function classificarVel(mbps){
  if(mbps <= 0.5) return 1
  if(mbps <= 1)   return 3
  if(mbps <= 5)   return 6
  if(mbps <= 10)  return 8
  if(mbps <= 20)  return 10
  return 14
}

async function medirVelocidade(){
  try {
    const downlink = navigator.connection?.downlink || 5
    return "N" + classificarVel(downlink)
  } catch { return "N6" }
}

async function medirBateria(){
  try {
    const bat = await navigator.getBattery()
    const pct = Math.round(bat.level * 10)
    const nivel = pct < 2 ? "BL" : "B" + pct
    const carregando = bat.charging ? "C1" : "C0"
    return { bateria: nivel, carregando }
  } catch { return { bateria: "", carregando: "" } }
}

function medirRAM(){
  const ram = navigator.deviceMemory || 4
  if(ram <= 2) return "R1"
  if(ram <= 4) return "R2"
  if(ram <= 8) return "R3"
  return "R4"
}

const [velTag, batObj] = await Promise.all([
  medirVelocidade(),
  medirBateria()
])

const tema    = window.matchMedia('(prefers-color-scheme: dark)').matches ? "D" : "L"
const ua      = navigator.userAgent || ""
const device  = /android/i.test(ua) ? "A" : "O"
const vib     = navigator.vibrate ? "V1" : "V0"
const conexao = "W"
const movimento = "M0"
const redeTag = "RH"
const placementTag = "PU"
const sourceTag = "SU"

;[
  tempoTag,
  velTag,
  batObj.bateria,
  batObj.carregando,
  tema,
  medirRAM(),
  vib,
  device,
  conexao,
  movimento,
  redeTag,
  placementTag,
  sourceTag
].forEach(enviarEvento)

// ===== MONTA CORPO SEM ID =====
const corpo = (
  baseUC +
  tempoTag +
  velTag +
  batObj.bateria +
  batObj.carregando +
  tema +
  medirRAM() +
  vib +
  device +
  conexao +
  movimento +
  redeTag +
  placementTag +
  sourceTag
)

// ===== ENVIA PRA FASE 2 =====
const dados = {
  corpo,
  userId,
  LINK
}

const encoded = btoa(JSON.stringify(dados))

const url = `${window.location.origin}${window.location.pathname}?data=${encoded}&from_insta=${isWebView()?1:0}`

// ===== REDIRECT CONTROLADO =====
if(isWebView()){
  if(/android/i.test(navigator.userAgent)){
    const intent =
      "intent://" +
      url.replace(/^https?:\/\//, "") +
      "#Intent;scheme=https;package=com.android.chrome;end"
    window.location.href = intent
  } else {
    window.open(url, "_blank")
    setTimeout(()=>{ window.location.href = url }, 500)
  }
}else{
  window.location.href = url
}

})();
</script>
</body>
</html>
